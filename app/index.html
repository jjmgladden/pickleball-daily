<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1420">
<title>Ozark Joe's Pickleball Daily Intelligence Report</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180x180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167x167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152x152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon-120x120.png">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<header class="app-header">
  <div class="logo" aria-hidden="true"></div>
  <h1>Ozark Joe's Pickleball Daily</h1>
  <span id="app-version" class="app-version" aria-label="App version"></span>
  <div class="meta" id="header-meta" aria-live="polite">Loading…</div>
</header>

<nav class="tabs" id="tabs" aria-label="Primary">
  <button data-tab="daily">Daily</button>
  <button data-tab="live">Live</button>
  <button data-tab="tournaments">Tournaments</button>
  <button data-tab="teams">MLP Teams</button>
  <button data-tab="players">Players</button>
  <button data-tab="stats">Stats</button>
  <button data-tab="highlights">Highlights</button>
  <button data-tab="news">News</button>
  <button data-tab="learn">Learn</button>
  <button data-tab="ask">Ask</button>
</nav>

<main>
  <section id="tab-daily"       class="tab-panel"><div class="loading">Loading Daily…</div></section>
  <section id="tab-live"        class="tab-panel"><div class="loading">Loading Live…</div></section>
  <section id="tab-tournaments" class="tab-panel"><div class="loading">Loading Tournaments…</div></section>
  <section id="tab-teams"       class="tab-panel"><div class="loading">Loading MLP Teams…</div></section>
  <section id="tab-players"     class="tab-panel"><div class="loading">Loading Players…</div></section>
  <section id="tab-stats"       class="tab-panel"><div class="loading">Loading Stats…</div></section>
  <section id="tab-highlights"  class="tab-panel"><div class="loading">Loading Highlights…</div></section>
  <section id="tab-news"        class="tab-panel"><div class="loading">Loading News…</div></section>
  <section id="tab-learn"       class="tab-panel"><div class="loading">Loading Learn…</div></section>
  <section id="tab-ask"         class="tab-panel"><div class="loading">Loading Ask…</div></section>
</main>

<footer class="app-footer">
  <span id="footer-meta">Data via ingestion/ (local) · PPA · MLP · DUPR · USAP · YouTube</span>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
